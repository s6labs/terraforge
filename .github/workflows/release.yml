name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
          - platform: linux-arm64
            os: ubuntu-24.04-arm
          - platform: macos-arm64
            os: macos-14
          - platform: windows-amd64
            os: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller build setuptools
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Binary
        shell: bash
        run: |
          pyinstaller --onefile --name terraforge-${{ matrix.platform }} terraforge.py

          # Windows: PyInstaller outputs .exe — rename to drop the extension so
          # the publish job can reference a consistent filename with .exe explicitly
          if [[ "${{ matrix.platform }}" == "windows-amd64" ]]; then
            mv dist/terraforge-windows-amd64.exe dist/terraforge-windows-amd64 || true
          fi

          # Generate SHA256 for this binary (Python: works on Linux, macOS, Windows)
          cd dist
          python3 -c "
          import hashlib, pathlib
          for f in sorted(pathlib.Path('.').glob('terraforge-${{ matrix.platform }}*')):
              if f.is_file():
                  digest = hashlib.sha256(f.read_bytes()).hexdigest()
                  print(f'{digest}  {f.name}')
          " > sha256-${{ matrix.platform }}.txt
          cat sha256-${{ matrix.platform }}.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraforge-${{ matrix.platform }}
          path: |
            dist/terraforge-${{ matrix.platform }}
            dist/sha256-${{ matrix.platform }}.txt

  # Single job — runs once after ALL four builds succeed
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Consolidate SHA256 checksums
        run: |
          cat all-artifacts/*/sha256-*.txt | sort > SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "TerraForge ${{ github.ref_name }}"
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            all-artifacts/terraforge-linux-amd64/terraforge-linux-amd64
            all-artifacts/terraforge-linux-arm64/terraforge-linux-arm64
            all-artifacts/terraforge-macos-arm64/terraforge-macos-arm64
            all-artifacts/terraforge-windows-amd64/terraforge-windows-amd64
            SHA256SUMS.txt
