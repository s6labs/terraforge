name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # needed for PyPI trusted publishing

jobs:
  # ─── Build standalone binaries ────────────────────────────────────────
  build:
    name: Build / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64
          - label: linux-amd64
            runner: ubuntu-22.04
            asset_stem: terraforge-linux-amd64
            ext: ""
            strip: "--strip"

          # Linux ARM64 (GitHub-hosted ARM runner)
          - label: linux-arm64
            runner: ubuntu-22.04-arm
            asset_stem: terraforge-linux-arm64
            ext: ""
            strip: "--strip"

          # macOS Intel
          - label: macos-intel
            runner: macos-13
            asset_stem: terraforge-macos-intel
            ext: ""
            strip: "--strip"

          # macOS Apple Silicon
          - label: macos-arm64
            runner: macos-latest
            asset_stem: terraforge-macos-arm64
            ext: ""
            strip: "--strip"

          # Windows x86-64
          - label: windows-amd64
            runner: windows-latest
            asset_stem: terraforge-windows-amd64
            ext: ".exe"
            strip: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "fastapi>=0.110.0" "uvicorn[standard]>=0.29.0"
          pip install pyinstaller

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.asset_stem }}" \
            ${{ matrix.strip }} \
            --add-data "src/web:src/web" \
            --add-data "examples:examples" \
            --hidden-import "src.llm.router" \
            --hidden-import "src.parsers.input_parser" \
            --hidden-import "src.core.generator" \
            --hidden-import "src.core.coder_client" \
            --hidden-import "src.validators.terraform" \
            --hidden-import "src.web.server" \
            --hidden-import "src.coordinator.bootstrap" \
            --hidden-import "src.coordinator.prompts" \
            --hidden-import "src.telemetry" \
            --hidden-import "uvicorn" \
            --hidden-import "fastapi" \
            terraforge.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pyinstaller `
            --onefile `
            --name "${{ matrix.asset_stem }}" `
            --add-data "src/web;src/web" `
            --add-data "examples;examples" `
            --hidden-import "src.llm.router" `
            --hidden-import "src.parsers.input_parser" `
            --hidden-import "src.core.generator" `
            --hidden-import "src.core.coder_client" `
            --hidden-import "src.validators.terraform" `
            --hidden-import "src.web.server" `
            --hidden-import "src.coordinator.bootstrap" `
            --hidden-import "src.coordinator.prompts" `
            --hidden-import "src.telemetry" `
            --hidden-import "uvicorn" `
            --hidden-import "fastapi" `
            terraforge.py

      - name: Verify binary
        shell: bash
        run: |
          BINARY="dist/${{ matrix.asset_stem }}${{ matrix.ext }}"
          echo "Binary size: $(du -sh $BINARY | cut -f1)"
          "$BINARY" --version || "$BINARY" --help | head -5

      - name: Package binary (tar.gz — Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf "${{ matrix.asset_stem }}.tar.gz" "${{ matrix.asset_stem }}"
          sha256sum "${{ matrix.asset_stem }}.tar.gz" > "${{ matrix.asset_stem }}.tar.gz.sha256"

      - name: Package binary (zip — Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "${{ matrix.asset_stem }}.exe" -DestinationPath "${{ matrix.asset_stem }}.zip"
          (Get-FileHash "${{ matrix.asset_stem }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.asset_stem }}.zip" | Out-File "${{ matrix.asset_stem }}.zip.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_stem }}
          path: |
            dist/${{ matrix.asset_stem }}.*
          retention-days: 1

  # ─── Publish to GitHub Releases ────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifact directories
        run: |
          find dist/ -mindepth 2 -type f -exec mv {} dist/ \;
          ls -lh dist/

      - name: Create combined checksums file
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TerraForge ${{ github.ref_name }}"
          body: |
            ## TerraForge ${{ github.ref_name }}

            ### Installation

            **macOS / Linux (one-line):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/s6labs/terraforge/main/get-terraforge.sh | bash
            ```

            **Homebrew:**
            ```bash
            brew tap s6labs/terraforge
            brew install terraforge
            ```

            **PyPI:**
            ```bash
            pip install terraforge
            ```

            ### Downloads

            | Platform | Architecture | Download |
            |----------|-------------|---------|
            | Linux | x86-64 | [terraforge-linux-amd64.tar.gz] |
            | Linux | ARM64 | [terraforge-linux-arm64.tar.gz] |
            | macOS | Intel | [terraforge-macos-intel.tar.gz] |
            | macOS | Apple Silicon | [terraforge-macos-arm64.tar.gz] |
            | Windows | x86-64 | [terraforge-windows-amd64.zip] |

            See `SHA256SUMS.txt` for integrity verification.
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ─── Publish to PyPI ────────────────────────────────────────────────────
  publish-pypi:
    name: PyPI Publish
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/terraforge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Patch version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_TOKEN secret required.
        # Configure the trusted publisher at https://pypi.org/manage/account/publishing/
