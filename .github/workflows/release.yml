name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
          - platform: linux-arm64
            os: ubuntu-24.04-arm
          - platform: macos-arm64
            os: macos-14
          - platform: windows-amd64
            os: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller build setuptools
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Binary
        shell: bash
        run: |
          pyinstaller --onefile --name terraforge-${{ matrix.platform }} terraforge.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraforge-${{ matrix.platform }}
          path: dist/terraforge-${{ matrix.platform }}*

  # Runs once after ALL build jobs finish — downloads every artifact and publishes one release
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "TerraForge ${{ github.ref_name }}"
          body: |
            ## TerraForge ${{ github.ref_name }}

            ### One-line install (macOS / Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/s6labs/terraforge/main/get-terraforge.sh | bash
            ```

            ### PyPI
            ```bash
            pip install terraforge
            ```

            ### Direct download
            See the assets below for pre-built binaries.
          files: dist/*
